<div class="auth-container">
    <div class="auth-card glass-panel register-card">
        <h2 class="text-neon-red">Create Account</h2>
        <p class="auth-subtitle">Join the studio to save your tracks</p>

        <div *ngIf="error" class="error-banner">{{ error }}</div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Artist Name</label>
                <input type="text" id="username" formControlName="username" class="form-control"
                    placeholder="Choose a name">
                <div class="validation-error"
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors?.['required']">
                    Artist name is required.
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors?.['minlength']">
                    Name must be at least 3 characters.
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" class="form-control"
                    placeholder="Enter your email">
                <div class="validation-error"
                    *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
                    Please enter a valid email.
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    placeholder="Create a password">
                <div class="validation-error"
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']">
                    Password is required.
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['minlength']">
                    Minimum 6 characters required.
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
                    placeholder="Repeat password">
                <div class="validation-error"
                    *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')">
                    Passwords do not match.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || loading">
                {{ loading ? 'Creating...' : 'Sign Up' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login" class="text-neon-dark-red">Log in</a></p>
        </div>
    </div>
</div>
