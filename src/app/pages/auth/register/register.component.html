<div class="auth-container">
    <div class="auth-card glass-panel register-card">
        <h2 class="text-neon-red">Create Account</h2>
        <p class="auth-subtitle">Join the studio to save your tracks</p>

        <div *ngIf="error" class="error-banner">{{ error }}</div>
        <div *ngIf="successMsg" class="success-banner" style="background: rgba(0, 150, 0, 0.2); border: 1px solid #00ff00; color: #00ff00; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 0.95rem;">
            {{ successMsg }}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Artist Name</label>
                <input type="text" id="username" formControlName="username" class="form-control"
                    placeholder="Choose a name">
                <div class="validation-error"
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors?.['required']">
                    Artist name is required.
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.errors?.['minlength']">
                    Name must be at least 3 characters.
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" class="form-control"
                    placeholder="Enter your email">
                <div class="validation-error"
                    *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
                    Please enter a valid email.
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input [type]="hidePassword ? 'password' : 'text'" id="password" formControlName="password" class="form-control"
                        placeholder="Create a password">
                    <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" title="Toggle Password Visibility">
                        <i class="fas" [class.fa-eye]="hidePassword" [class.fa-eye-slash]="!hidePassword"></i>
                    </button>
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']">
                    Password is required.
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['minlength']">
                    Minimum 6 characters required.
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input [type]="hideConfirmPassword ? 'password' : 'text'" id="confirmPassword" formControlName="confirmPassword" class="form-control"
                        placeholder="Repeat password">
                    <button type="button" class="password-toggle" (click)="toggleConfirmPasswordVisibility()" title="Toggle Confirm Password Visibility">
                        <i class="fas" [class.fa-eye]="hideConfirmPassword" [class.fa-eye-slash]="!hideConfirmPassword"></i>
                    </button>
                </div>
                <div class="validation-error"
                    *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')">
                    Passwords do not match.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || loading">
                {{ loading ? 'Creating...' : 'Sign Up' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login" class="text-neon-dark-red">Log in</a></p>
        </div>
    </div>
</div>
