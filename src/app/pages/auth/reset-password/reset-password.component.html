<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2 class="text-neon-dark-red">New Password</h2>
        <p class="auth-subtitle">Secure your studio session</p>

        <div *ngIf="error" class="error-banner">
            <div>{{ error }}</div>
        </div>

        <div *ngIf="successMsg" class="success-banner">
            <div>{{ successMsg }}</div>
            <div style="margin-top: 10px;">
                <a routerLink="/login" class="btn btn-sm" style="background:#005500; color:#fff; text-decoration:none; padding: 5px 15px; border-radius: 4px; font-weight: bold;">Log In Now</a>
            </div>
        </div>

        <form *ngIf="!successMsg" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    placeholder="Enter your new password">
                <div class="validation-error"
                    *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid">
                    Password must be at least 6 characters long.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="resetForm.invalid || loading">
                {{ loading ? 'Saving...' : 'Update Password' }}
            </button>
        </form>
    </div>
</div>
