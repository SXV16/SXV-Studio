<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2 class="text-neon-dark-red">Recovery</h2>
        <p class="auth-subtitle">Reset your studio session</p>

        <div *ngIf="error" class="error-banner">
            <div>{{ error }}</div>
        </div>

        <div *ngIf="successMsg" class="success-banner">
            <div>{{ successMsg }}</div>
        </div>

        <form *ngIf="!successMsg" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Account Email</label>
                <input type="email" id="email" formControlName="email" class="form-control"
                    placeholder="Enter your email">
                <div class="validation-error"
                    *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
                    Please enter a valid email.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="forgotForm.invalid || loading">
                {{ loading ? 'Sending...' : 'Send Reset Link' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Remembered your password? <a routerLink="/login" class="text-neon-red">Log In</a></p>
        </div>
    </div>
</div>
