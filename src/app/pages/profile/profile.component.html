<div class="profile-container daw-panel glass-panel">
    <div class="profile-header mb-4">
        <h2 class="workspace-title text-neon-red">Artist Profile</h2>
        <button class="btn btn-secondary btn-sm" *ngIf="!isEditing" (click)="isEditing = true">Edit Profile</button>
        <button class="btn btn-primary btn-sm" *ngIf="isEditing" (click)="saveProfile()" [disabled]="isSaving">Save Changes</button>
    </div>

    <div class="profile-content">
        <!-- Avatar Section -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img *ngIf="previewUrl" [src]="previewUrl" alt="Profile avatar" class="avatar-img">
                <div *ngIf="!previewUrl" class="avatar-placeholder text-muted">
                    <span style="font-size: 3rem;">👤</span>
                </div>
                
                <div class="avatar-overlay" *ngIf="isEditing" (click)="fileInput.click()">
                    <span>Change Picture</span>
                </div>
            </div>
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
            <p class="mt-3 text-muted" style="font-size:0.8rem;" *ngIf="isEditing">Upload JPG, PNG max 2MB</p>
        </div>

        <!-- Details Section -->
        <div class="details-section">
            <div class="form-group mb-3">
                <label>Username</label>
                <div class="static-value text-muted" style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px;">{{ user.username }} (Cannot be changed)</div>
            </div>

            <div class="form-group mb-3">
                <label>Tier</label>
                <div class="static-value text-muted" style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; display:inline-block;">{{ user.tier }}</div>
            </div>

            <div class="form-group mb-3">
                <label>Artist Name</label>
                <input type="text" class="form-control" [(ngModel)]="user.artist_name" *ngIf="isEditing" placeholder="E.g., SxvxgeMelo">
                <div class="static-value" *ngIf="!isEditing" style="font-size: 1.2rem; color: #fff;">{{ user.artist_name || 'No artist name set' }}</div>
            </div>

            <div class="form-group mb-4">
                <label>Biography</label>
                <textarea class="form-control" [(ngModel)]="user.bio" *ngIf="isEditing" rows="4" placeholder="Tell your fans about your music..."></textarea>
                <div class="static-value" *ngIf="!isEditing" style="color: #ccc; white-space: pre-wrap;">{{ user.bio || 'No biography set yet.' }}</div>
            </div>
        </div>
    </div>
</div>
