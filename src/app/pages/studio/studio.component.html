<div class="studio-container">
    <div class="studio-header">
        <h1 class="text-neon-red">Recording Studio</h1>
        <p class="text-muted">Capture your next hit. Allow microphone access to begin.</p>
    </div>

    <div class="deck-container glass-panel">
        <div class="visualizer" [class.active]="isRecording">
            <div class="bar bar-1"></div>
            <div class="bar bar-2"></div>
            <div class="bar bar-3"></div>
            <div class="bar bar-4"></div>
            <div class="bar bar-5"></div>
            <div class="bar bar-6"></div>
            <div class="bar bar-7"></div>
        </div>

        <div class="timer" [class.recording-pulse]="isRecording">
            {{ formatTime(recordingTime) }}
            <span class="status-dot" *ngIf="isRecording"></span>
        </div>

        <div class="controls">
            <button class="control-btn record-btn" (click)="startRecording()" *ngIf="!isRecording" title="Record">
                <div class="record-circle"></div>
            </button>

            <button class="control-btn stop-btn" (click)="stopRecording()" *ngIf="isRecording" title="Stop">
                <div class="stop-square"></div>
            </button>
        </div>
    </div>

    <div class="playback-area glass-panel" *ngIf="audioUrl">
        <h3 class="text-neon-dark-red">Take Review</h3>
        <audio controls [src]="audioUrl" class="audio-player"></audio>
        <div class="action-buttons">
            <button class="btn btn-primary" (click)="saveTrack()">Save to Library</button>
            <button class="btn btn-secondary" (click)="audioUrl = null">Discard Take</button>
        </div>
    </div>

    <div class="success-banner" *ngIf="savedMessage">
        {{ savedMessage }}
        <a routerLink="/library">View Library</a>
    </div>
</div>
