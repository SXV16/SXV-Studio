<div class="dialog-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="dialog-panel glass-panel" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h3 class="dialog-title">{{ options?.title }}</h3>
    </div>
    <div class="dialog-body">
      <p class="dialog-message">{{ options?.message }}</p>
      
      <div *ngIf="options?.type === 'prompt'" class="dialog-input-group">
        <input #promptInput type="text" class="form-control" [(ngModel)]="inputValue" (keydown.enter)="confirm()">
      </div>
    </div>
    <div class="dialog-footer">
      <button *ngIf="options?.type !== 'alert'" class="btn btn-secondary" (click)="cancel()">{{ options?.cancelText || 'Cancel' }}</button>
      <button class="btn btn-primary" (click)="confirm()">{{ options?.confirmText || 'OK' }}</button>
    </div>
  </div>
</div>
